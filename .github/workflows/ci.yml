name: Frontend CI/CD with Node & Vite

on:
  push:
    branches: [ "main", "staging" ]
  pull_request:
    branches: [ "main", "staging" ]

jobs:
  build-and-check:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      # Menjalankan ESLint sebagai Code Quality Tool (jika ada)
      - name: Run Lint
        run: npm run lint --if-present

      # Memastikan aplikasi bisa di-build dengan sukses sebelum di-deploy
      - name: Build check
        run: npm run build

  deploy-staging:
    name: Deploy to Azure VPS (Staging)
    runs-on: ubuntu-latest
    needs: [ build-and-check ]
    if: github.ref == 'refs/heads/staging'
    steps:
      - name: Execute SSH Commands to Deploy
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USERNAME }}
          key: ${{ secrets.VPS_PRIVATE_KEY }}
          script: |
            # 1. Masuk ke folder repository frontend di server
            cd ~/yomu-infra/staging/yomu-frontend
            
            # 2. Sinkronisasi dengan GitHub
            git fetch origin
            git reset --hard origin/staging
            
            # 3. Kembali ke folder root infra dan rebuild container frontend
            cd ~/yomu-infra/staging
            docker compose up -d --build staging-frontend

  deploy-production:
    name: Dummy CD (Production - Vercel)
    runs-on: ubuntu-latest
    needs: [ build-and-check ]
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Trigger Vercel Production Deployment
        run: |
          echo "🚀 CI Frontend Lulus! Memicu deployment ke Vercel Environment: Production..."
          echo "⚙️ Menjalankan perintah: vercel build && vercel deploy --prod"
          echo "🌐 App Production URL Target: https://yomu.vercel.app"